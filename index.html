<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결혼 준비 런시트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F3F1; --surface:#FFFFFF; --ink:#1E1C22; --sub:#6E6A75; --line:#E3E1DE;
  --focus:#31527B;      /* 현재 절차 */
  --pre:#9A4F3F;        /* 선행 조건 (이걸 먼저) */
  --next:#3F7263;       /* 후행 (이게 풀린다) */
  --money:#55705B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
  font-family:'IBM Plex Sans KR',-apple-system,sans-serif;touch-action:none;overscroll-behavior:none}
#app{position:fixed;inset:0;display:flex;flex-direction:column}

/* ---------- header ---------- */
header{padding:10px 16px 8px;background:var(--bg);z-index:20;border-bottom:1px solid var(--line)}
.h-top{display:flex;align-items:baseline;justify-content:space-between}
.h-eyebrow{font-size:9.5px;letter-spacing:2.5px;color:var(--sub);font-weight:600}
h1{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-top:1px}
.dday{font-size:12px;color:var(--sub);text-align:right}
.dday b{color:var(--focus);font-size:14px;display:block}
.dday input{border:none;background:transparent;font:inherit;color:var(--sub);width:112px;text-align:right}
/* 툴바 */
.h-tools{display:flex;gap:6px;margin-top:8px}
.tbtn{flex:1;padding:7px 0;border-radius:9px;border:1px solid var(--line);background:var(--surface);
  font-size:12px;font-weight:600;color:var(--ink);font-family:inherit;cursor:pointer}
.tbtn:active{background:#F1F0EE}
.tbtn:disabled{opacity:.35}
.tbtn.primary{color:var(--focus)}
/* 오버레이 모달 (검색/예산) */
#ovl{position:fixed;inset:0;background:rgba(30,28,34,.35);z-index:40;display:none}
#ovl.on{display:block}
#modal{position:fixed;left:0;right:0;bottom:0;max-height:80vh;background:var(--surface);
  border-radius:20px 20px 0 0;z-index:41;display:none;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -8px 30px rgba(30,28,34,.2)}
#modal.on{display:flex}
.m-head{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--line)}
.m-title{font-size:15px;font-weight:700;flex:1}
.m-close{border:none;background:#F1F0EE;border-radius:10px;width:34px;height:34px;font-size:14px;cursor:pointer;font-family:inherit}
.m-body{overflow-y:auto;padding:12px 16px 18px;touch-action:pan-y}
#searchInput{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--line);
  font:inherit;font-size:14px;background:#FBFAF9;outline:none}
#searchInput:focus{border-color:var(--focus)}
.sr-empty{font-size:13px;color:var(--sub);padding:18px 4px;text-align:center}

.stat{font-size:12.5px;line-height:1.7;color:#3C3944;padding:10px 12px;border-radius:12px;
  background:#F7F6F4;border:1px solid var(--line);margin-bottom:8px}
.stat b{color:var(--focus)}
.chip.warn{background:#F6EAE7;color:#A4503F;font-weight:600}
.chip.soon{background:#FBF3E3;color:#8A6B1F;font-weight:600}
.chip.date{background:#EFEEF6;color:#4E4A78;font-weight:600}
/* 패널 액션 (캘린더/공유/생략) */
.act-row{display:flex;gap:8px;margin:12px 0 2px}
.abtn{flex:1;padding:10px 0;border-radius:11px;border:1px solid var(--line);background:#FBFAF9;
  font-size:12px;font-weight:600;color:var(--ink);font-family:inherit;cursor:pointer;text-align:center;text-decoration:none}
.abtn:active{background:#F1F0EE}
.abtn.skip-on{background:#F6EAE7;color:#A4503F;border-color:#E4C7C0}
/* 바로가기 링크 */
.lnk{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--focus);
  padding:7px 12px;border-radius:20px;border:1px solid #C9D3E0;background:#F4F7FB;
  text-decoration:none;margin:0 6px 6px 0}
.lnk::after{content:"↗";font-size:10px;opacity:.7}
/* 생략된 절차 */
.row.skipped{opacity:.28}
.row.skipped text.nm{text-decoration:line-through}
#worldDetail.focusing .row.skipped{opacity:.15}
/* 커스텀 모달 */
.cu-label{font-size:11.5px;font-weight:700;color:var(--sub);margin:14px 0 6px;letter-spacing:.5px}
.cu-names{display:flex;gap:8px;align-items:center}
.cu-names input{flex:1;padding:10px 12px;border-radius:11px;border:1.5px solid var(--line);
  font:inherit;font-size:14px;outline:none;background:#FBFAF9;min-width:0}
.cu-names input:focus{border-color:var(--focus)}
.preset{display:flex;gap:7px}
.pbtn{flex:1;padding:10px 4px;border-radius:11px;border:1.5px solid var(--line);background:#FBFAF9;
  font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--ink)}
.pbtn.on{border-color:var(--focus);background:#F4F7FB;color:var(--focus)}
.cu-note{font-size:11.5px;color:var(--sub);line-height:1.6;margin-top:6px}
html.bigfont .s-tip,html.bigfont .s-check,html.bigfont .s-ask{font-size:14.5px}
html.bigfont .p-title{font-size:17.5px}
html.bigfont .rel{font-size:13.5px}
/* 검색 확장 */
.qrow{display:flex;gap:8px;margin-top:10px;align-items:center}
.sel{padding:9px 10px;border-radius:10px;border:1.5px solid var(--line);font:inherit;
  font-size:12.5px;background:#FBFAF9;color:var(--ink);outline:none;flex:0 0 auto}
.qchips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.qchip{font-size:11.5px;padding:5px 10px;border-radius:16px;background:#F1F0EE;color:var(--sub);
  cursor:pointer;border:none;font-family:inherit;font-weight:600}
.qchip:active{background:#E7E6E3}
.rel.col{flex-direction:column;align-items:stretch;gap:3px}
.rl1{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.rl1 .ph{font-size:10px;color:var(--focus);font-weight:700}
.snip{font-size:11.5px;color:var(--sub);line-height:1.55}
.snip b{color:var(--pre);font-weight:700}
/* 요약 */
.sum-ph{font-size:12px;font-weight:700;margin:16px 0 6px;color:var(--ink);
  display:flex;justify-content:space-between;align-items:baseline}
.sum-ph small{font-size:10.5px;color:var(--focus);font-weight:600}
/* 테마 스와치 */
.swatches{display:flex;gap:12px;padding:2px 0}
.sw{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;
  outline:2px solid var(--line);outline-offset:2px}
.sw.on{outline-color:var(--ink)}
/* 비용 숨김 */
html.nocost .chip.cost{display:none}
/* 다크 모드 */
html.dark{--bg:#141318;--surface:#1F1D24;--ink:#EDEBF1;--sub:#9B96A4;--line:#34313B}
html.dark .tbtn,html.dark .nav,html.dark .abtn,html.dark .pbtn,html.dark .m-close,
html.dark .qchip,html.dark .expander{background:#2A2731;color:var(--ink)}
html.dark .chip{background:#2A2731;color:var(--sub)}
html.dark .chip.d{background:#26303E;color:#8FB0DA}
html.dark .chip.cost{background:#243029;color:#8FBF9F}
html.dark .chip.date{background:#2B2940;color:#A9A3E0}
html.dark .chip.warn{background:#3A2724;color:#E09A87}
html.dark .chip.soon{background:#3A3322;color:#DFC27A}
html.dark .rel,html.dark .stat{background:#26242C}
html.dark .row.focus rect.bg{fill:#232B38}
html.dark .spine{stroke:#3B3844}
html.dark .row circle.dot{stroke:#4A4653}
html.dark #searchInput,html.dark .cu-names input,html.dark .sel{background:#26242C;color:var(--ink)}
html.dark .s-tip,html.dark .s-check,html.dark .s-ask{color:#C9C5D0}
html.dark .lnk{background:#232B38;border-color:#3B475A;color:#8FB0DA}
html.dark .seg{background:#2A2731}
html.dark .sr-empty,html.dark .cu-note{color:#8B8694}
/* 예산 v2 */

.okTxt{color:var(--next);font-weight:700}
.warnTxt{color:var(--pre);font-weight:700}
.sim{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:var(--ink);margin:4px 0}
.sim input{width:64px;padding:7px 8px;border:1px solid var(--line);border-radius:8px;
  font:inherit;font-size:13px;text-align:right;background:#FBFAF9;outline:none}
html.dark .sim input{background:#26242C;color:var(--ink)}
.abtn:disabled{opacity:.35}
/* 패널 액션 */
.act-row{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 2px}
.act{padding:8px 11px;border-radius:10px;border:1px solid var(--line);background:#FBFAF9;
  font-size:12px;font-weight:600;color:var(--ink);font-family:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.act:active{background:#F1F0EE}
.act.warn{color:#A4503F;border-color:#E5D2CC}
.act.ok{color:var(--next);border-color:#CFDDD6}
.memo-box{width:100%;min-height:64px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--line);
  font:inherit;font-size:13px;line-height:1.6;background:#FBFAF9;outline:none;resize:vertical}
.memo-box:focus{border-color:var(--focus)}
.off-banner{font-size:12.5px;color:#A4503F;background:#F6EAE7;border-radius:10px;padding:10px 12px;margin-top:10px}
/* 설정 */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.set-row small{display:block;font-size:11px;color:var(--sub);margin-top:2px}
.tgl{position:relative;width:44px;height:26px;flex:0 0 auto;cursor:pointer}
.tgl input{opacity:0;width:0;height:0}
.tgl i{position:absolute;inset:0;border-radius:13px;background:#D8D6D2;transition:.2s}
.tgl i::after{content:"";position:absolute;left:3px;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl input:checked+i{background:var(--next)}
.tgl input:checked+i::after{transform:translateX(18px)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.form-grid input,.form-grid select{padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);font:inherit;font-size:13px;background:#FBFAF9;outline:none}
.form-grid input:focus,.form-grid select:focus{border-color:var(--focus)}
.form-grid .full{grid-column:1/-1}
.btn-wide{width:100%;padding:12px;border-radius:12px;border:none;background:var(--focus);color:#fff;
  font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px}
.btn-wide.ghost{background:#F1F0EE;color:#A4503F}
.save-note{font-size:11px;color:var(--sub);margin-top:10px;line-height:1.6}
/* 단계 진행 바 (run sheet segments) */
#phaseBar{display:flex;gap:3px;margin-top:9px;height:22px}
.seg{flex:1;border-radius:4px;background:#E7E6E3;position:relative;cursor:pointer;overflow:hidden}
.seg.active{background:var(--focus)}
.seg .tip{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:8.5px;font-weight:600;color:var(--sub);white-space:nowrap;overflow:hidden}
.seg.active .tip{color:#fff}

/* ---------- stage ---------- */
#stage{flex:1;position:relative;overflow:hidden;background:var(--bg)}
svg{position:absolute;inset:0;width:100%;height:100%;display:block}
#viewport{will-change:transform}

.ph-head text.num{font-size:11px;font-weight:700;fill:var(--sub);letter-spacing:1px}
.ph-head text.nm{font-size:16px;font-weight:700;fill:var(--ink)}
.ph-head text.pd{font-size:10.5px;fill:var(--sub)}
.ph-head line{stroke:var(--line);stroke-width:1}

.spine{stroke:#D8D6D2;stroke-width:2}
.row{cursor:pointer}
.row rect.bg{fill:var(--surface);stroke:var(--line);stroke-width:1;rx:10}
.row text.nm{font-size:13.5px;font-weight:600;fill:var(--ink)}
.row text.info{font-size:10.5px;fill:var(--sub)}
.row text.dl{font-size:9.5px;font-weight:600;fill:var(--sub);text-anchor:end}
.row circle.dot{fill:var(--surface);stroke:#B9B6B1;stroke-width:2}
/* 포커스/관계 상태 */
#worldDetail.focusing .row{opacity:.32}
#worldDetail.focusing .row.focus,#worldDetail.focusing .row.pre,#worldDetail.focusing .row.next{opacity:1}
#worldDetail.focusing .ph-head,#worldDetail.focusing .spine{opacity:.5}
.row.focus rect.bg{stroke:var(--focus);stroke-width:2;fill:#F4F7FB}
.row.off rect.bg{stroke-dasharray:4 3;fill:#F5F4F2}
.row.off text.nm{fill:#A5A1AA;text-decoration:line-through}
.row.off text.info,.row.off text.dl{fill:#B9B6B1}
.row.off circle.dot{stroke:#CFCCC7;fill:#F5F4F2}
.row.custom rect.bg{stroke:#8A6B1F}
.row.focus circle.dot{stroke:var(--focus);fill:var(--focus)}
.row.focus text.dl{fill:var(--focus)}
.row.pre rect.bg{stroke:var(--pre);stroke-width:1.4}
.row.pre circle.dot{stroke:var(--pre)}
.row.next rect.bg{stroke:var(--next);stroke-width:1.4}
.row.next circle.dot{stroke:var(--next)}
.f-edge{fill:none;stroke-width:2;opacity:.85}
.f-edge.pre{stroke:var(--pre)}
.f-edge.next{stroke:var(--next);stroke-dasharray:5 4}
.f-tag{font-size:9px;font-weight:700}
.f-tag.pre{fill:var(--pre)} .f-tag.next{fill:var(--next)}

/* overview phase cards */
.p-card rect.bg{fill:var(--surface);stroke:var(--line);stroke-width:1;rx:14}
.p-card text.num{font-size:13px;font-weight:700;fill:var(--sub);letter-spacing:1px}
.p-card text.nm{font-size:20px;font-weight:700;fill:var(--ink)}
.p-card text.pd{font-size:12px;fill:var(--focus)}
.p-card text.ct{font-size:12px;fill:var(--sub)}

.controls{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:8px;z-index:15}
.ctl{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
  color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(30,28,34,.08);cursor:pointer}
.ctl:active{transform:scale(.94)}
.ctl.fit{font-size:10.5px;font-weight:700}

/* ---------- story panel (bottom) ---------- */
#panel{background:var(--surface);border-top:1px solid var(--line);z-index:30;
  box-shadow:0 -6px 24px rgba(30,28,34,.10);display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom)}
.p-head{display:flex;align-items:center;gap:10px;padding:10px 12px}
.nav{width:46px;height:52px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
  font-size:17px;color:var(--ink);cursor:pointer;flex:0 0 auto}
.nav:disabled{opacity:.3}
.nav:active:not(:disabled){background:#F1F0EE}
.p-mid{flex:1;min-width:0;cursor:pointer}
.p-eyebrow{font-size:10px;font-weight:600;color:var(--sub);letter-spacing:.5px;display:flex;gap:8px;align-items:center}
.p-eyebrow .cnt{color:var(--focus)}
.p-title{font-size:16px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-chips{display:flex;gap:6px;margin-top:4px;flex-wrap:nowrap;overflow:hidden}
.chip{font-size:10.5px;padding:3px 8px;border-radius:20px;background:#F1F0EE;color:var(--sub);white-space:nowrap}
.chip.d{background:#EBF0F6;color:var(--focus);font-weight:600}
.chip.cost{background:#EDF1EC;color:var(--money)}
.expander{width:34px;height:52px;border:none;background:transparent;color:var(--sub);
  font-size:15px;cursor:pointer;flex:0 0 auto;transition:transform .25s}
#panel.open .expander{transform:rotate(180deg)}
.p-body{max-height:0;overflow-y:auto;transition:max-height .32s cubic-bezier(.3,.9,.35,1);
  touch-action:pan-y;padding:0 16px}
#panel.open .p-body{max-height:52vh;padding-bottom:14px}
.s-sec{font-size:11.5px;font-weight:700;color:var(--ink);margin:14px 0 7px;
  display:flex;align-items:center;gap:8px}
.s-sec::after{content:"";flex:1;height:1px;background:var(--line)}
.s-sec .mark{width:8px;height:8px;border-radius:2px;flex:0 0 auto}
.s-tip{font-size:13px;line-height:1.68;color:#3C3944;padding-left:13px;position:relative;margin-bottom:7px}
.s-tip::before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--focus)}
.s-check{font-size:13px;line-height:1.6;color:#3C3944;padding-left:22px;position:relative;margin-bottom:6px}
.s-check::before{content:"";position:absolute;left:0;top:4px;width:11px;height:11px;border-radius:3px;border:1.5px solid #B9B6B1}
.s-check[data-ck]{cursor:pointer;user-select:none;-webkit-user-select:none}
.s-check.on{color:#A5A1AC;text-decoration:line-through}
.s-check.on::before{background:var(--next);border-color:var(--next)}
.todo-task{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin:10px 0 4px;padding:6px 8px;background:#F7F6F4;border-radius:8px;cursor:pointer}
html.dark .todo-task{background:#2A2733}
.todo-task b{font-size:13px;font-weight:600}
.todo-task small{font-size:11px;color:var(--sub);white-space:nowrap}
.todo-bar{position:sticky;top:0;background:var(--surface);padding:4px 0 8px;z-index:2;font-size:12px;color:var(--sub)}
.todo-bar b{color:var(--next)}
.s-ask{font-size:13px;line-height:1.6;color:#3C3944;padding-left:19px;position:relative;margin-bottom:6px}
.s-ask::before{content:"Q";position:absolute;left:0;top:1px;font-size:10.5px;font-weight:700;color:var(--money)}
.rel{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:8px 10px;border-radius:10px;
  margin-bottom:6px;cursor:pointer;border:1px solid var(--line);background:#FBFAF9}
.rel:active{background:#F1F0EE}
.rel .rd{margin-left:auto;font-size:10px;color:var(--sub);white-space:nowrap}
.rel.pre{border-left:3px solid var(--pre)}
.rel.next{border-left:3px solid var(--next)}
.guide-link{display:inline-block;margin:10px 0 4px;font-size:12px;font-weight:600;color:var(--focus);
  background:none;border:none;font-family:inherit;cursor:pointer;text-decoration:underline;text-underline-offset:3px}

/* ---------- 구조 분석 뷰 ---------- */
.st-note{font-size:11.5px;color:var(--sub);line-height:1.55;margin:4px 0 10px}
.st-note b{color:var(--ink)}
.st-sec{margin:16px 0 7px;font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.3px}
.st-sec b{color:var(--focus)}
.st-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);
  border-radius:10px;margin-bottom:6px;background:var(--surface);font-size:13px;cursor:pointer}
.st-item:active{background:#F1F0EE}
.st-item.off{opacity:.4}
.st-item .n{flex:1;font-weight:600;letter-spacing:-.2px}
.st-item small{color:var(--sub);font-size:10.5px;white-space:nowrap}
.st-deg{font-size:11px;font-weight:700;color:var(--focus);min-width:34px;text-align:right}
.st-item.edge .st-deg{color:var(--sub)}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;background:#F3EDE2;color:#8A6A2E;white-space:nowrap}
.badge.g{background:#E9F1ED;color:#3F7263}
.row[data-tier=core] .bg{stroke:var(--focus);stroke-width:1.5}
.row[data-tier=edge] .bg{stroke-dasharray:4 3}

/* ---------- 연결 지도(v7-5) ---------- */
.me{fill:none;stroke:#C9C5BE;stroke-width:1.1;opacity:.7}
.me.pre{stroke:var(--pre);stroke-width:2.2;opacity:1}
.me.next{stroke:var(--next);stroke-width:2.2;opacity:1}
.me.dim{opacity:.08}
.mnode{cursor:pointer}
.mnode .mb{fill:var(--surface);stroke:var(--line);stroke-width:1.1}
.mnode .mn-core{stroke:var(--focus);stroke-width:2}
.mnode .mn-edge{stroke-dasharray:4 3}
.mnode .mt{font-size:9.5px;font-weight:600;fill:var(--ink);letter-spacing:-.3px}
.mnode .mw.family{fill:#B08A3E}.mnode .mw.guest{fill:#3F7263}
.mnode.off,.mnode.skipped{opacity:.25}

   규칙: 외곽 = 후속 0(그 자체로 끝) · 중핵 = 후속 수 상위 15위 이내(동점 포함) · 나머지 중간 */
const GRAPH={desc:{},anc:{},tier:{},thr:0,up:{},dn:{}};
let MLAY=null;
function computeGraph(){
  const succ={},memoD={},memoA={},byId={};
  for(const t of TASKS)byId[t.id]=t;
  for(const t of TASKS)for(const d of t.deps)(succ[d]=succ[d]||[]).push(t.id);
  const D=id=>{if(memoD[id])return memoD[id];const s=new Set();
    for(const n of(succ[id]||[])){s.add(n);for(const x of D(n))s.add(x)}return memoD[id]=s};
  const A=id=>{if(memoA[id])return memoA[id];const s=new Set();
    for(const d of((byId[id]&&byId[id].deps)||[])){s.add(d);for(const x of A(d))s.add(x)}return memoA[id]=s};
  for(const t of TASKS){GRAPH.desc[t.id]=D(t.id).size;GRAPH.anc[t.id]=A(t.id).size;
    GRAPH.dn[t.id]=D(t.id);GRAPH.up[t.id]=A(t.id);}
  const ds=Object.values(GRAPH.desc).slice().sort((a,b)=>b-a);
  GRAPH.thr=Math.max(1,ds[Math.min(14,ds.length-1)]||1);
  for(const t of TASKS){const d=GRAPH.desc[t.id];
    GRAPH.tier[t.id]=d>=GRAPH.thr?'core':(d>0?'mid':'edge');}
  computeMapLayout();
}
/* 연결 지도 배치(v7-5): 층위 = 뿌리로부터의 최장 경로, 층내 순서 = barycenter 4회 스윕.
   결정적 규약(파이썬 골든과 동일): 초기 순서 = TASKS 배열, 동점은 직전 위치 유지,
   키는 1e-9로 양자화 — 부동소수 합산 노이즈가 동점 판정을 가르는 것을 차단
   (예: Python 3.12+ sum()의 Neumaier 보정합산 vs JS reduce의 최하위 비트 차이). */
function computeMapLayout(){
  const idx={},byId={},lay={};
  TASKS.forEach((t,i)=>{idx[t.id]=i;byId[t.id]=t;});
  const L=id=>{if(lay[id]!=null)return lay[id];const d=byId[id].deps;
    return lay[id]=d.length?1+Math.max(...d.map(L)):0;};
  TASKS.forEach(t=>L(t.id));
  const maxL=Math.max(...TASKS.map(t=>lay[t.id]));
  const layers=Array.from({length:maxL+1},()=>[]);
  TASKS.forEach(t=>layers[lay[t.id]].push(t.id));
  layers.forEach(a=>a.sort((x,y)=>idx[x]-idx[y]));
  const succ={};TASKS.forEach(t=>t.deps.forEach(d=>(succ[d]=succ[d]||[]).push(t.id)));
  const pos={};const re=()=>layers.forEach(a=>a.forEach((v,i)=>pos[v]=i));re();
  const norm=v=>(pos[v]+0.5)/layers[lay[v]].length;
  const Q=x=>Math.floor(x*1e9+0.5)/1e9;
  for(let it=0;it<4;it++){
    for(let l=1;l<=maxL;l++){const k={};
      for(const v of layers[l]){const d=byId[v].deps;
        k[v]=Q(d.length?d.reduce((s,p)=>s+norm(p),0)/d.length:norm(v));}
      layers[l].sort((a,b)=>(k[a]-k[b])||(pos[a]-pos[b]));re();}
    for(let l=maxL-1;l>=0;l--){const k={};
      for(const v of layers[l]){const s=succ[v]||[];
        k[v]=Q(s.length?s.reduce((q,n)=>q+norm(n),0)/s.length:norm(v));}
      layers[l].sort((a,b)=>(k[a]-k[b])||(pos[a]-pos[b]));re();}
  }
  const NW=74,NH=30,CW=82,RH=64,PT=64,PL=20;
  const maxN=Math.max(...layers.map(a=>a.length));
  MLAY={n:{},layers,lay,W:maxN*CW+PL*2,H:PT+(maxL+1)*RH+20};
  layers.forEach((a,l)=>a.forEach((v,i)=>{
    MLAY.n[v]={x:PL+maxN*CW/2+(i-(a.length-1)/2)*CW-NW/2,y:PT+l*RH,w:NW,h:NH};}));
  // 형식검증: 모든 간선은 아래로만 흘러야 함
  let bad=0;TASKS.forEach(t=>t.deps.forEach(d=>{if(lay[d]>=lay[t.id])bad++;}));
  if(bad)console.warn('[지도 검증] 비하강 간선',bad);
}
/*GRAPH-END*/

(function verifyGraph(){
  const off=s=>{const p=s.split('~')[0].trim();
    let m=p.match(/^D([+-])(\d+)/); if(m) return (m[1]==='+'?1:-1)*+m[2]*1440;
    m=p.match(/^H([+-])(\d+):(\d+)/); return m?(m[1]==='+'?1:-1)*(+m[2]*60+ +m[3]):0};
  const errs=[];
  for(const t of TASKS) for(const d of t.deps){
    const p=taskById[d];
    if(!p){errs.push('참조오류 '+t.id+'→'+d);continue}
    if(off(p.d)>off(t.d)) errs.push('시간역전 '+d+'('+p.d+')→'+t.id+'('+t.d+')');
  }
  const st={};
  const dfs=id=>{st[id]=1;
    for(const d of (taskById[id]?taskById[id].deps:[])){
      if(st[d]===1) errs.push('순환 '+d+'↔'+id);
      else if(!st[d]) dfs(d);
    } st[id]=2;};
  TASKS.forEach(t=>{if(!st[t.id])dfs(t.id)});
  const E=TASKS.reduce((a,t)=>a+t.deps.length,0);
  try{console[errs.length?'warn':'log']('[런시트 형식검증 · build 7-5.3] 절차 '+TASKS.length+' · 간선 '+E+(errs.length?' · 문제 '+errs.length+'건':' · 이상 없음'), errs.length?errs:'');}catch(_e){}
})();

const layout={rows:{},phases:{}};
function computeLayout(){
  layout.rows={};layout.phases={};
  let y=20;
  for(const p of PHASES){
    layout.phases[p.id]={y0:y};
    y+=PHH;
    const ts=TASKS.filter(t=>t.g===p.id);
    for(const t of ts){
      layout.rows[t.id]={x:RX,y,w:RW,h:RH};
      y+=RH+RGAP;
    }
    layout.phases[p.id].y1=y-RGAP;
    y+=PHGAP;
  }
  layout.totalH=y;
}

const vp=$('viewport'),stage=$('stage'),detailL=$('worldDetail'),overL=$('worldOverview');
const ZOOM_T=0.5, MIN_S=0.1, MAX_S=2.2;
const view={s:1,tx:0,ty:0}, goal={s:1,tx:0,ty:0};
let rect=stage.getBoundingClientRect();
let needRender=false, animRunning=false, lastDetailOn=null;

function render(){
  vp.setAttribute('transform',`translate(${view.tx} ${view.ty}) scale(${view.s})`);
  if(MAPMODE){
    detailL.style.opacity=0;overL.style.opacity=0;mapL.style.opacity=1;
    detailL.style.pointerEvents='none';overL.style.pointerEvents='none';
    mapL.style.pointerEvents='auto';lastDetailOn=-1;return;
  }
  mapL.style.opacity=0;mapL.style.pointerEvents='none';
  const op=Math.min(1,Math.max(0,(view.s-ZOOM_T+0.1)/0.2));
  detailL.style.opacity=op; overL.style.opacity=1-op;
  const on=op>0.5;
  if(on!==lastDetailOn){
    detailL.style.pointerEvents=on?'auto':'none';
    overL.style.pointerEvents=on?'none':'auto';
    lastDetailOn=on;
  }
}
function scheduleRender(){if(needRender)return;needRender=true;
  requestAnimationFrame(()=>{needRender=false;render();});}
function animTick(){
  const k=(typeof REDUCE!=='undefined'&&REDUCE)?1:0.22;let done=true;
  const ds=goal.s-view.s,dx=goal.tx-view.tx,dy=goal.ty-view.ty;
  if(Math.abs(ds)>0.0008||Math.abs(dx)>0.4||Math.abs(dy)>0.4){
    view.s+=ds*k;view.tx+=dx*k;view.ty+=dy*k;done=false;
  }else{view.s=goal.s;view.tx=goal.tx;view.ty=goal.ty;}
  render();
  if(!done)requestAnimationFrame(animTick);else animRunning=false;
}
function startAnim(){if(!animRunning){animRunning=true;requestAnimationFrame(animTick);}}
function syncGoal(){goal.s=view.s;goal.tx=view.tx;goal.ty=view.ty;}
function clampS(s){return Math.min(MAX_S,Math.max(MIN_S,s));}
function clampPan(v){
  const w=curW()*v.s,h=curH()*v.s,m=90;
  v.tx=Math.min(rect.width-m,Math.max(m-w,v.tx));
  v.ty=Math.min(rect.height-m,Math.max(m-h,v.ty));

  if(stage.setPointerCapture)try{stage.setPointerCapture(e.pointerId);}catch(_){}
  if(ptrs.size===2){const[a,b]=[...ptrs.values()];
    lastDist=Math.hypot(a.x-b.x,a.y-b.y);
    lastMid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};}
});
stage.addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId))return;
  const prev=ptrs.get(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1){
    const dx=e.clientX-prev.x,dy=e.clientY-prev.y;
    if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
    vx=vx*0.5+dx*0.5;vy=vy*0.5+dy*0.5;
    view.tx+=dx;view.ty+=dy;clampPan(view);syncGoal();scheduleRender();
  }else if(ptrs.size===2){
    moved=true;
    const[a,b]=[...ptrs.values()];
    const dist=Math.hypot(a.x-b.x,a.y-b.y);
    const mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    if(lastDist>0){
      const ns=clampS(view.s*(dist/lastDist)),k=ns/view.s;
      const cx=mid.x-rect.left,cy=mid.y-rect.top;
      view.tx=cx-(cx-view.tx)*k;view.ty=cy-(cy-view.ty)*k;view.s=ns;
    }
    view.tx+=mid.x-lastMid.x;view.ty+=mid.y-lastMid.y;
    lastDist=dist;lastMid=mid;clampPan(view);syncGoal();scheduleRender();
  }
});
function endPtr(e){
  const wasSingle=ptrs.size===1;
  if(!moved&&wasSingle&&performance.now()-downAt<500&&downTarget){
    const rowEl=downTarget.closest('.row');
    const cardEl=downTarget.closest('.p-card');
    const mapEl=downTarget.closest('.mnode');
    if(mapEl&&mapEl.dataset.id)focusStep(mapEl.dataset.id,true);
    else if(rowEl)focusStep(rowEl.dataset.id,true);
    else if(cardEl){const first=TASKS.find(t=>t.g===cardEl.dataset.p);focusStep(first.id,true);}
  }else if(moved&&wasSingle&&Math.abs(vx)+Math.abs(vy)>3){
    inertiaOn=true;requestAnimationFrame(inertiaTick);
  }
  ptrs.delete(e.pointerId);lastDist=0;downTarget=null;
}
stage.addEventListener('pointerup',endPtr);
stage.addEventListener('pointercancel',e=>{ptrs.delete(e.pointerId);lastDist=0;downTarget=null;});

function shareStep(t){

  if(navigator.share){navigator.share({title:t.name,text}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('내용을 복사했어요. 붙여넣기로 공유하세요.')).catch(()=>{});}
}

function dOffset(d){
  if(/D-day/i.test(d))return 0;
  const m=d.match(/D([+-])\s?(\d+)/);
  if(!m)return null;
  return m[1]==='-'?parseInt(m[2]):-parseInt(m[2]);
}
let weddingDate=null;

function dateChipFor(t){
  if(!weddingDate)return '';

  const remain=Math.ceil((dt-new Date())/86400000);
  let badge='';
  if(remain<0)badge=chip('권장 시기 지남','warn');
  else if(remain<=14)badge=chip(`임박 ${remain}일 전`,'soon');
  return chip('📅 '+label,'date')+badge;

function step(dir){
  const AO=activeOrder();
  let i=AO.indexOf(FOCUS);
  if(i<0){ // 현재 절차가 생략됨: ORDER상 가장 가까운 활성 절차로
    const oi=ORDER.indexOf(FOCUS);
    i=-1;
    for(let k=oi+ (dir>0?1:-1); k>=0&&k<ORDER.length; k+=dir){
      const ai=AO.indexOf(ORDER[k]);
      if(ai>=0){focusStep(ORDER[k],true);return;}
    }
    return;
  }
  const ni=Math.min(AO.length-1,Math.max(0,i+dir));
  if(ni!==i)focusStep(AO[ni],true);
}
